name: project-quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Formatting check
        run: test -z "$(gofmt -l cmd internal)"
      - name: Vet
        run: go vet ./...
      - name: Tests
        run: go test ./...
      - name: Coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tee coverage.txt
      - name: Race detector
        run: go test -race ./...
      - name: Benchmark smoke
        run: go test -bench=. -run '^$' -benchtime=1x ./...
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate repository evidence structure
        run: ./scripts/validate_repository.sh
      - name: Validate shell scripts
        run: sh -n scripts/validate_repository.sh

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build .
      - name: Validate compose config
        run: docker compose config

  k6-admin-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate k6 scripts are present
        run: test -f benchmarks/k6/smoke.js

